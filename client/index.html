<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PeerTerm — Instant Terminal Sharing</title>
  <meta name="description" content="Share your terminal with anyone using a 6-digit code. End-to-end encrypted, no installation required.">

  <!-- xterm.js from CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ═══ Connect Screen ═══════════════════════════════════════════════════ -->
  <div id="connect-screen">
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <h1>PeerTerm</h1>
    </div>
    <p class="brand-subtitle">Instant terminal sharing, end-to-end encrypted</p>

    <div class="connect-card">
      <h2 class="card-title">Join a session</h2>
      <p class="card-description">Enter the 6-digit code shared by the host to connect to their terminal.</p>

      <div class="input-group">
        <label class="input-label" for="code-input">Session Code</label>
        <input
          id="code-input"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="000000"
          autocomplete="off"
          autofocus
        >
      </div>

      <button id="connect-btn" type="button">
        <span class="btn-text">Connect</span>
        <div class="btn-spinner"></div>
      </button>

      <div id="error-msg"></div>

      <div class="security-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <span>End-to-end encrypted</span>
      </div>
    </div>

    <p class="connect-footer">Open source · No installation required</p>
  </div>

  <!-- ═══ Connecting Overlay ═══════════════════════════════════════════════ -->
  <div id="connecting-overlay">
    <div class="connecting-spinner"></div>
    <div class="connecting-text">Establishing encrypted connection...</div>
  </div>

  <!-- ═══ Terminal Screen ══════════════════════════════════════════════════ -->
  <div id="terminal-screen">
    <div class="status-bar">
      <div class="status-left">
        <div class="status-brand">
          <span class="dot"></span>
          PeerTerm
        </div>
        <div class="status-divider"></div>
        <span class="status-session" id="status-code"></span>
        <span id="readonly-badge">&#128065; View Only</span>
      </div>
      <div class="status-right">
        <!-- Paste button -->
        <button id="paste-btn" class="toolbar-btn" title="Paste (Ctrl+Shift+V)">Paste</button>
        <div class="status-divider"></div>
        <!-- Mobile controls -->
        <div class="mobile-controls">
          <button id="kbd-toggle-btn" class="toolbar-btn" title="Toggle keyboard">&#9000;&#65039;</button>
          <button id="tab-btn" class="toolbar-btn" title="Send Tab">Tab</button>
          <button id="font-down-btn" class="toolbar-btn" title="Smaller font">A-</button>
          <button id="font-up-btn" class="toolbar-btn" title="Larger font">A+</button>
          <div class="status-divider"></div>
        </div>
        <div id="connection-indicator">&#9203; Connecting...</div>
        <div class="status-divider"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <span>Encrypted</span>
      </div>
    </div>

    <!-- File upload zone — visible only when DataChannel is open and not readonly -->
    <div id="file-upload-zone" class="file-upload-zone" style="display:none;">
      <input type="file" id="file-input" hidden>
      <button id="upload-btn" class="toolbar-btn upload-btn" title="Upload file to host">&#128193; Upload File</button>
      <div id="upload-progress" class="upload-progress" style="display:none;">
        <span id="upload-filename" class="upload-filename"></span>
        <div class="upload-bar-track">
          <div id="upload-bar-fill" class="upload-bar-fill"></div>
        </div>
        <span id="upload-percent" class="upload-percent">0%</span>
      </div>
    </div>

    <div id="terminal-container">
    </div>
  </div>

  <!-- Hidden mobile input -->
  <input id="mobile-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

  <!-- Floating copy button -->
  <button id="copy-btn">Copy</button>

  <!-- Clipboard toast -->
  <div id="clipboard-toast"></div>

  <!-- Toast notification container -->
  <div id="toast-container"></div>

  <script src="app.js" defer></script>
</body>
</html>
